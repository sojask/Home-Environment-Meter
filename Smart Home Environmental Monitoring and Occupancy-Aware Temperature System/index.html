<!DOCTYPE html>
<html>
<head>
<title>Smart Environment Monitor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family: Tahoma, sans-serif;
background:#d7fcde;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.dashboard{
display:grid;
grid-template-columns: repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
text-align:center;
}

.value{
font-size:2em;
margin-top:10px;
}

.occupied{
color:lightgreen;
font-weight:bold;
}

.empty{
color:gray;
font-weight:bold;
}

.alert{
background:#ffdddd;
border-left:5px solid red;
padding:10px;
margin-bottom:20px;
display:none;
}

.settings{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
max-width:400px;
}

input{
width:80px;
padding:5px;
margin:5px;
}

button{
padding:8px 12px;
border:none;
background:#007BFF;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.chart-container{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
margin-bottom:30px;
}

</style>
</head>

<body>

<h1>Smart Home Environment Dashboard</h1>

<div id="alertBox" class="alert"></div>

<div class="dashboard">

<div class="card">
<h3>Temperature</h3>
<div id="temperature" class="value">-- °C</div>
</div>

<div class="card">
<h3>Humidity</h3>
<div id="humidity" class="value">-- %</div>
</div>

<div class="card">
<h3>Occupancy</h3>
<div id="occupancy" class="value">Unknown</div>
</div>

</div>

<div class="chart-container">
<h3>Temperature History</h3>
<canvas id="tempChart"></canvas>
</div>

<div class="settings">

<h3>Threshold Settings</h3>

<label>Temp Min</label>
<input id="tempMin" type="number" value="18">

<label>Temp Max</label>
<input id="tempMax" type="number" value="26">

<br>

<label>Humidity Min</label>
<input id="humMin" type="number" value="30">

<label>Humidity Max</label>
<input id="humMax" type="number" value="60">

<br><br>

<button onclick="saveThresholds()">Save</button>

</div>

<script>

// Threshold values
let thresholds = {
tempMin:18,
tempMax:26,
humMin:30,
humMax:60
}

// Chart setup
const ctx = document.getElementById('tempChart');

const tempChart = new Chart(ctx,{
type:'line',
data:{
labels:[],
datasets:[{
label:'Temperature °C',
data:[],
borderWidth:2
}]
},
options:{
responsive:true
}
});

// Update dashboard
function updateDashboard(data){

document.getElementById("temperature").innerText =
data.temperature + " °C";

document.getElementById("humidity").innerText =
data.humidity + " %";

const occ = document.getElementById("occupancy");

if(data.occupied){
occ.innerText="Occupied";
occ.className="value occupied";
}
else{
occ.innerText="Empty";
occ.className="value empty";
}

checkAlerts(data);
updateChart(data);

}

// Alert check
function checkAlerts(data){

let message="";

if(data.temperature > thresholds.tempMax){
message+="Temperature above threshold! ";
}

if(data.temperature < thresholds.tempMin){
message+="Temperature below threshold! ";
}

if(data.humidity > thresholds.humMax){
message+="Humidity above threshold! ";
}

if(data.humidity < thresholds.humMin){
message+="Humidity below threshold! ";
}

const alertBox=document.getElementById("alertBox");

if(message){
alertBox.style.display="block";
alertBox.innerText="⚠ "+message;
}
else{
alertBox.style.display="none";
}

}

// Update graph
function updateChart(data){

tempChart.data.labels.push(data.time);
tempChart.data.datasets[0].data.push(data.temperature);

if(tempChart.data.labels.length > 20){
tempChart.data.labels.shift();
tempChart.data.datasets[0].data.shift();
}

tempChart.update();

}

// Save threshold
function saveThresholds(){

thresholds.tempMin =
document.getElementById("tempMin").value;

thresholds.tempMax =
document.getElementById("tempMax").value;

thresholds.humMin =
document.getElementById("humMin").value;

thresholds.humMax =
document.getElementById("humMax").value;

alert("Thresholds saved");

}

// Fetch data from backend
async function fetchData(){

try{

const response = await fetch("/api/sensor-data");
const data = await response.json();

updateDashboard(data);

}

catch{

// Example fallback data
const mockData={
temperature:(20+Math.random()*5).toFixed(1),
humidity:(40+Math.random()*10).toFixed(0),
occupied:Math.random()>0.5,
time:new Date().toLocaleTimeString()
};

updateDashboard(mockData);
}

}

// Update every 60 seconds
setInterval(fetchData,60000);

// Initial load
fetchData();

</script>

</body>
</html>
